<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Iccha Delivery Partner</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />
    
    <!-- Leaflet JS for Maps (Live Tracking) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* TEMA: LIGHT MODE */
        :root { 
            --primary: #06b6d4;
            --primary-dark: #0891b2;
            --bg-light: #f1f5f9;
            --card-light: #ffffff;
            --text-dark: #0f172a;
            --border-color: #e2e8f0;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-light); 
            color: var(--text-dark); 
            -webkit-tap-highlight-color: transparent;
        }
        
        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        .card {
            background-color: var(--card-light);
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.07);
        }

        .btn-primary { background-color: var(--primary); color: white; font-weight: 600; transition: 0.2s; }
        .btn-primary:active { transform: scale(0.98); background-color: var(--primary-dark); }
        .btn-success { background-color: #10b981; color: white; font-weight: 600; transition: 0.2s; }
        
        /* Inputs */
        input, select {
            background-color: #f8fafc;
            border: 1px solid #cbd5e1;
            color: var(--text-dark);
            border-radius: 0.5rem;
            padding: 0.875rem;
            width: 100%;
        }
        input:focus { outline: none; border-color: var(--primary); }

        /* Toggle */
        .toggle-checkbox:checked { right: 0; border-color: #10b981; }
        .toggle-checkbox:checked + .toggle-label { background-color: #10b981; }
        .toggle-checkbox { right: 0; z-index: 1; border-color: #e2e8f0; transition: all 0.3s; }
        .toggle-label { width: 3rem; height: 1.5rem; background-color: #ef4444; border-radius: 9999px; transition: all 0.3s; }

        #map { z-index: 10; border-radius: 1rem; height: 100%; width: 100%; }
        
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Fullscreen Map Logic */
        .map-fullscreen {
            position: fixed !important;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw !important; height: 100vh !important;
            z-index: 9999; border-radius: 0 !important;
        }
        
        .loader { border: 3px solid #e2e8f0; border-top: 3px solid var(--primary); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="overflow-hidden h-screen w-screen flex flex-col relative selection:bg-cyan-500/30">

    <!-- KYC SCREEN -->
    <div id="kyc-screen" class="fixed inset-0 z-[100] bg-slate-100 overflow-y-auto hidden">
        <div class="p-6 pb-20 max-w-md mx-auto">
            <div class="text-center mb-8 pt-4">
                <span class="material-symbols-outlined text-cyan-500 text-6xl mb-2">two_wheeler</span>
                <h1 class="text-2xl font-bold text-slate-800">Partner KYC</h1>
                <p class="text-sm text-slate-500 mt-2">Fill details to start delivering.</p>
            </div>
            <form id="kyc-form" class="space-y-5">
                <div><label class="block text-sm text-slate-500 mb-1">Name</label><input type="text" id="dp-name" required></div>
                <div><label class="block text-sm text-slate-500 mb-1">Mobile</label><input type="tel" id="dp-phone" required></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-sm text-slate-500 mb-1">Vehicle</label><select id="dp-vehicle-type"><option value="bike">Bike</option><option value="scooter">Scooter</option></select></div>
                    <div><label class="block text-sm text-slate-500 mb-1">Number</label><input type="text" id="dp-vehicle-no" required></div>
                </div>
                <div><label class="block text-sm text-slate-500 mb-1">DL Number</label><input type="text" id="dp-dl-no" required></div>
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-200"><label class="block text-sm text-slate-500 mb-2">Selfie</label><input type="file" id="dp-photo" accept="image/*" class="text-sm" required></div>
                <div class="p-4 bg-slate-50 rounded-xl border border-slate-200"><label class="block text-sm text-slate-500 mb-2">DL Photo</label><input type="file" id="dp-dl-photo" accept="image/*" class="text-sm" required></div>
                <button type="submit" class="w-full btn-primary py-4 rounded-xl text-lg flex justify-center items-center gap-2 mt-4"><span>Submit</span><div id="kyc-loader" class="loader"></div></button>
            </form>
        </div>
    </div>

    <!-- PENDING SCREEN -->
    <div id="pending-screen" class="fixed inset-0 z-[90] bg-slate-100 flex flex-col items-center justify-center p-6 text-center hidden">
        <span class="material-symbols-outlined text-yellow-500 text-6xl mb-4">hourglass_empty</span>
        <h2 class="text-2xl font-bold text-slate-800">Verification Pending</h2>
        <button onclick="window.location.reload()" class="mt-8 px-6 py-3 bg-white text-slate-700 rounded-lg border">Refresh</button>
    </div>

    <!-- DASHBOARD -->
    <div id="main-dashboard" class="flex-1 flex flex-col h-full hidden bg-slate-50">
        <!-- Header -->
        <header class="card px-4 py-3 sticky top-0 z-50 rounded-b-2xl border-t-0">
            <div class="flex justify-between items-center mb-3">
                <div class="flex items-center gap-3">
                    <img id="head-profile-img" src="https://placehold.co/100" class="w-10 h-10 rounded-full object-cover border border-cyan-500">
                    <div><h2 class="text-sm font-bold text-slate-800" id="head-name">Driver</h2><p class="text-[10px] text-cyan-600 font-bold" id="head-vehicle">...</p></div>
                </div>
                <div class="flex flex-col items-end">
                    <div class="relative inline-block w-12 mr-2 align-middle select-none">
                        <input type="checkbox" id="duty-toggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer"/>
                        <label for="duty-toggle" class="toggle-label block overflow-hidden h-6 rounded-full cursor-pointer"></label>
                    </div>
                    <span id="duty-status-text" class="text-[10px] font-bold text-red-500 uppercase mt-1 mr-2">Offline</span>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-2">
                <div class="bg-slate-50 rounded-xl p-3 border"><p class="text-[10px] text-slate-500 font-bold">EARNINGS</p><p class="text-xl font-bold text-green-500">₹<span id="stat-earnings">0</span></p></div>
                <div class="bg-slate-50 rounded-xl p-3 border"><p class="text-[10px] text-slate-500 font-bold">DELIVERIES</p><p class="text-xl font-bold text-slate-800"><span id="stat-deliveries">0</span></p></div>
            </div>
        </header>

        <!-- Content -->
        <main class="flex-1 overflow-y-auto p-4 pb-24 space-y-4 relative" id="main-content-area">
            
            <!-- Map (Hidden initially) -->
            <div id="map-container" class="w-full h-64 bg-slate-200 rounded-2xl border border-slate-300 overflow-hidden shadow-sm hidden relative">
                <div id="map"></div>
                <button id="focus-gps-btn" class="absolute bottom-4 right-16 z-[400] bg-white text-black p-2 rounded-full shadow border"><span class="material-symbols-outlined text-cyan-600">my_location</span></button>
                <button id="fullscreen-map-btn" class="absolute bottom-4 right-4 z-[400] bg-white text-black p-2 rounded-full shadow border"><span class="material-symbols-outlined text-cyan-600">fullscreen</span></button>
            </div>

            <!-- Active Order -->
            <div id="active-delivery-section" class="hidden animate-slide-up">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">Current Task</h3>
                <div id="active-order-card" class="card rounded-2xl p-4 border border-cyan-500/50 shadow-md"></div>
            </div>

            <!-- New Requests -->
            <div id="new-requests-section">
                <h3 class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3">New Requests</h3>
                <div id="new-orders-list" class="space-y-3"></div>
            </div>
        </main>

        <!-- Nav -->
        <nav class="card fixed bottom-0 left-0 right-0 h-16 flex justify-around items-center rounded-t-2xl z-50">
            <button class="flex flex-col items-center gap-1 text-cyan-600 w-16"><span class="material-symbols-outlined fill-1">home</span><span class="text-[9px] font-bold">Home</span></button>
            <button class="flex flex-col items-center gap-1 text-slate-400 w-16"><span class="material-symbols-outlined">receipt_long</span><span class="text-[9px] font-bold">History</span></button>
            <button class="flex flex-col items-center gap-1 text-slate-400 w-16"><span class="material-symbols-outlined">person</span><span class="text-[9px] font-bold">Profile</span></button>
        </nav>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <script>
        // CONFIG
        const firebaseConfig = { apiKey: "AIzaSyAeqfZ0mT_o7vBndcSiLisHQ3qOaavWBtk", authDomain: "nexara-c1ab0.firebaseapp.com", databaseURL: "https://nexara-c1ab0-default-rtdb.firebaseio.com", projectId: "nexara-c1ab0", storageBucket: "nexara-c1ab0.firebasestorage.app", messagingSenderId: "1021765831407", appId: "1:1021765831407:web:2795c51be3621c1ca0291a" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let PARTNER_ID = localStorage.getItem('iccha_dp_id');
        if (!PARTNER_ID) { PARTNER_ID = db.ref('delivery_partners').push().key; localStorage.setItem('iccha_dp_id', PARTNER_ID); }
        
        const myProfileRef = db.ref(`delivery_partners/${PARTNER_ID}`);
        const ordersRef = db.ref('orders');
        let PARTNER_DATA = null;
        let isOnline = false;
        let currentActiveOrder = null;
        
        // Map Globals
        let map = null, myMarker = null, shopMarker = null, custMarker = null;
        let myLat = 0, myLng = 0, watchId = null;

        // INIT
        window.addEventListener('DOMContentLoaded', () => {
            checkOnboardingStatus();
            
            document.getElementById('duty-toggle').addEventListener('change', (e) => {
                isOnline = e.target.checked;
                const statusText = document.getElementById('duty-status-text');
                statusText.innerText = isOnline ? 'ONLINE' : 'OFFLINE';
                statusText.className = `text-[10px] font-bold uppercase mt-1 mr-2 ${isOnline ? 'text-green-500' : 'text-red-500'}`;
                myProfileRef.update({ isOnline: isOnline });

                if (isOnline) {
                    startGPS();
                    fetchOrders();
                } else {
                    stopGPS();
                    document.getElementById('new-orders-list').innerHTML = `<div class="text-center py-10 bg-slate-100 rounded-2xl border border-dashed"><p class="text-slate-500">You are Offline</p></div>`;
                }
            });
        });

        function checkOnboardingStatus() {
            myProfileRef.on('value', snapshot => {
                PARTNER_DATA = snapshot.val();
                document.getElementById('kyc-screen').classList.add('hidden');
                document.getElementById('pending-screen').classList.add('hidden');
                document.getElementById('main-dashboard').classList.add('hidden');

                if (!PARTNER_DATA) {
                    document.getElementById('kyc-screen').classList.remove('hidden');
                } else if (PARTNER_DATA.status === 'pending') {
                    document.getElementById('pending-screen').classList.remove('hidden');
                    document.getElementById('pending-screen').classList.add('flex');
                } else {
                    document.getElementById('main-dashboard').classList.remove('hidden');
                    document.getElementById('main-dashboard').classList.add('flex');
                    setupDashboard();
                }
            });
        }

        function setupDashboard() {
            document.getElementById('head-name').innerText = PARTNER_DATA.name || 'Driver';
            document.getElementById('head-vehicle').innerText = PARTNER_DATA.vehicleNo || '';
            if(PARTNER_DATA.photoUrl) document.getElementById('head-profile-img').src = PARTNER_DATA.photoUrl;
            document.getElementById('stat-earnings').innerText = PARTNER_DATA.earnings || 0;
            document.getElementById('stat-deliveries').innerText = PARTNER_DATA.totalDeliveries || 0;

            if(PARTNER_DATA.isOnline) {
                document.getElementById('duty-toggle').click();
            }
        }

        // ===============================================
        //  CORE LOGIC: FETCHING ORDERS (IMPROVED)
        // ===============================================
        function fetchOrders() {
            ordersRef.on('value', snapshot => {
                const data = snapshot.val();
                if (!data) return;

                let hasActive = false;
                let newOrdersHtml = '';

                Object.entries(data).forEach(([key, order]) => {
                    // 1. Check Active Orders
                    if (order.deliveryBoyId === PARTNER_ID && (order.status === 'Accepted by Delivery' || order.status === 'Out for Delivery')) {
                        hasActive = true;
                        currentActiveOrder = { id: key, ...order };
                        renderActiveOrder(currentActiveOrder);
                    }
                    
                    // 2. Check Available Orders (BROADER CHECK)
                    // Showing orders that are 'Ready', 'Pending', 'Confirm', etc. AND not assigned to anyone else
                    const validStatuses = ['Ready for Pickup', 'Pending', 'Confirm', 'Cooking', 'Placed']; 
                    
                    if (isOnline && (!order.deliveryBoyId || order.deliveryBoyId === "") && validStatuses.includes(order.status)) {
                        newOrdersHtml += generateOrderCard(key, order);
                    }
                });

                // Visibility Logic
                const mapCont = document.getElementById('map-container');
                const activeSec = document.getElementById('active-delivery-section');
                
                if (hasActive) {
                    activeSec.classList.remove('hidden');
                    mapCont.classList.remove('hidden');
                    initMap();
                } else {
                    activeSec.classList.add('hidden');
                    mapCont.classList.add('hidden');
                    currentActiveOrder = null;
                }

                // Always show new orders list
                const listEl = document.getElementById('new-orders-list');
                if (isOnline) {
                    listEl.innerHTML = newOrdersHtml || `<div class="text-center py-10 bg-slate-100 rounded-2xl border border-dashed"><p class="text-slate-500">Scanning for orders...</p></div>`;
                }
            });
        }

        function generateOrderCard(id, order) {
            return `
            <div class="card rounded-2xl p-4">
                <div class="flex justify-between items-start mb-2 border-b border-slate-100 pb-2">
                    <div><span class="bg-cyan-100 text-cyan-700 text-[10px] font-bold px-2 py-1 rounded-full">NEW (${order.status})</span><p class="text-sm font-bold mt-1">#${id.substr(-6)}</p></div>
                    <div class="text-right"><p class="text-[10px] text-slate-400 font-bold">EARN</p><p class="text-xl font-bold text-green-600">₹40</p></div>
                </div>
                <div class="space-y-2 mb-3">
                    <div class="flex gap-2"><span class="material-symbols-outlined text-cyan-500 text-sm">storefront</span><p class="text-xs text-slate-600 truncate">${order.shopName || 'Shop'}</p></div>
                    <div class="flex gap-2"><span class="material-symbols-outlined text-red-500 text-sm">location_on</span><p class="text-xs text-slate-600 truncate">${order.customerInfo?.address || 'Customer Address'}</p></div>
                </div>
                <button onclick="acceptOrder('${id}')" class="w-full btn-primary py-3 rounded-xl shadow-md">Accept Order</button>
            </div>`;
        }

        window.acceptOrder = function(id) {
            ordersRef.child(id).update({
                deliveryBoyId: PARTNER_ID,
                deliveryBoyName: PARTNER_DATA.name,
                deliveryBoyPhone: PARTNER_DATA.phone,
                status: 'Accepted by Delivery'
            });
        };

        function renderActiveOrder(order) {
            const el = document.getElementById('active-order-card');
            
            // SMART COORDINATE FINDER
            let dest = null;
            if(order.status === 'Accepted by Delivery') {
                dest = getCoords(order.shopLocation) || getCoords(order.location);
            } else {
                dest = getCoords(order.customerInfo?.location) || getCoords(order.dropLocation) || getCoords(order.location);
            }
            
            // Update Map Markers
            setTimeout(() => updateMap(dest), 500);

            let btnHtml = '';
            if(order.status === 'Accepted by Delivery') {
                btnHtml = `<button onclick="updateStatus('${order.id}', 'Out for Delivery')" class="w-full py-4 btn-primary rounded-xl text-lg flex justify-center gap-2"><span>Picked Up</span><span class="material-symbols-outlined">package_2</span></button>`;
            } else {
                btnHtml = `<button onclick="updateStatus('${order.id}', 'Delivered')" class="w-full py-4 btn-success rounded-xl text-lg flex justify-center gap-2"><span>Delivered</span><span class="material-symbols-outlined">check_circle</span></button>`;
            }

            el.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-cyan-600 uppercase">${order.status}</span>
                    <span id="dist-info" class="text-xs font-bold text-slate-400">-- km</span>
                </div>
                <div class="mb-4">
                    <h4 class="font-bold text-lg">${order.status === 'Accepted by Delivery' ? (order.shopName || 'Shop') : (order.customerInfo?.name || 'Customer')}</h4>
                    <p class="text-sm text-slate-500">${order.status === 'Accepted by Delivery' ? 'Pickup Location' : (order.customerInfo?.address || 'Drop Location')}</p>
                </div>
                ${btnHtml}
            `;
        }

        window.updateStatus = function(id, status) {
            if(confirm('Are you sure?')) {
                const updates = { status: status };
                if(status === 'Delivered') {
                    updates.deliveredAt = firebase.database.ServerValue.TIMESTAMP;
                    myProfileRef.update({ 
                        earnings: (PARTNER_DATA.earnings || 0) + 40,
                        totalDeliveries: (PARTNER_DATA.totalDeliveries || 0) + 1
                    });
                }
                ordersRef.child(id).update(updates);
            }
        };

        // ===============================================
        //  MAP & GPS (FIXED)
        // ===============================================
        function initMap() {
            if(map) { map.invalidateSize(); return; }
            map = L.map('map', {zoomControl: false}).setView([20.5937, 78.9629], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png').addTo(map);

            const i1 = L.divIcon({className:'c-icon', html:`<div style="background:#06b6d4;width:14px;height:14px;border:2px solid white;border-radius:50%;box-shadow:0 0 5px black"></div>`});
            const i2 = L.divIcon({className:'c-icon', html:`<div style="background:#6366f1;width:18px;height:18px;border:2px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 5px black"><span class="material-symbols-outlined" style="font-size:10px;color:white">store</span></div>`});
            const i3 = L.divIcon({className:'c-icon', html:`<div style="background:#ef4444;width:18px;height:18px;border:2px solid white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 5px black"><span class="material-symbols-outlined" style="font-size:10px;color:white">home</span></div>`});

            myMarker = L.marker([0,0], {icon: i1}).addTo(map);
            shopMarker = L.marker([0,0], {icon: i2}).addTo(map);
            custMarker = L.marker([0,0], {icon: i3}).addTo(map);

            // Fullscreen
            document.getElementById('fullscreen-map-btn').onclick = () => {
                document.getElementById('map-container').classList.toggle('map-fullscreen');
                setTimeout(() => map.invalidateSize(), 300);
            };
            document.getElementById('focus-gps-btn').onclick = () => {
                if(myLat) map.setView([myLat, myLng], 16);
            };
        }

        // Helper to safely get lat/lng from any object structure
        function getCoords(obj) {
            if(!obj) return null;
            if(obj.lat && obj.lng) return {lat: obj.lat, lng: obj.lng};
            if(obj.latitude && obj.longitude) return {lat: obj.latitude, lng: obj.longitude};
            return null;
        }

        function updateMap(dest) {
            if(!map) return;
            shopMarker.setOpacity(0); custMarker.setOpacity(0);
            
            const bounds = [];
            if(myLat) {
                myMarker.setLatLng([myLat, myLng]);
                bounds.push([myLat, myLng]);
            }

            if(dest) {
                const marker = currentActiveOrder.status === 'Accepted by Delivery' ? shopMarker : custMarker;
                marker.setLatLng([dest.lat, dest.lng]).setOpacity(1);
                bounds.push([dest.lat, dest.lng]);
                
                // Dist Calc
                const d = calcDist(myLat, myLng, dest.lat, dest.lng);
                const de = document.getElementById('dist-info');
                if(de) de.innerText = d.toFixed(2) + " km";
            } else {
                const de = document.getElementById('dist-info');
                if(de) de.innerText = "No GPS";
            }

            if(bounds.length > 1) map.flyToBounds(bounds, {padding: [50,50]});
        }

        function calcDist(lat1, lon1, lat2, lon2) {
            const R = 6371; 
            const dLat = (lat2-lat1) * Math.PI/180;
            const dLon = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
        }

        function startGPS() {
            if(!navigator.geolocation) return;
            watchId = navigator.geolocation.watchPosition(pos => {
                myLat = pos.coords.latitude; myLng = pos.coords.longitude;
                if(myMarker) myMarker.setLatLng([myLat, myLng]);
                if(currentActiveOrder) {
                    ordersRef.child(currentActiveOrder.id).child('deliveryLocation').set({lat: myLat, lng: myLng});
                    // Refresh map route
                    let dest = currentActiveOrder.status === 'Accepted by Delivery' ? getCoords(currentActiveOrder.shopLocation) : getCoords(currentActiveOrder.customerInfo?.location);
                    if(dest) updateMap(dest);
                }
            }, err => console.log(err), {enableHighAccuracy: true});
        }
        function stopGPS() { if(watchId) navigator.geolocation.clearWatch(watchId); }
        
        // KYC Image Upload (Same as before)
        const CLOUDINARY_URL = 'https://api.cloudinary.com/v1_1/dtvrhjtt4/image/upload';
        const UPLOAD_PRESET = 'Soul_Spark';
        document.getElementById('kyc-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            document.getElementById('kyc-loader').style.display='block';
            
            const upload = async (id) => {
                const f = document.getElementById(id).files[0];
                const fd = new FormData(); fd.append('file', f); fd.append('upload_preset', UPLOAD_PRESET);
                const r = await fetch(CLOUDINARY_URL, {method:'POST', body:fd});
                return (await r.json()).secure_url;
            }
            
            const p1 = await upload('dp-photo');
            const p2 = await upload('dp-dl-photo');
            
            await myProfileRef.set({
                name: document.getElementById('dp-name').value,
                phone: document.getElementById('dp-phone').value,
                vehicleNo: document.getElementById('dp-vehicle-no').value,
