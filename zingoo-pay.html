<!DOCTYPE html>
<html class="dark scroll-smooth" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>Zingoo - Secure Payment</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&amp;family=Syne:wght@700;800;900&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Razorpay Checkout Script -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    
    <!-- Tailwind Config for Zingoo Theme -->
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "fontFamily": {
                        "headline-lg-mobile": ["Syne"],
                        "headline-md": ["Syne"],
                        "label-md": ["Outfit"],
                        "body-lg": ["Outfit"],
                        "caption": ["Outfit"],
                        "headline-lg": ["Syne"],
                        "body-md": ["Outfit"],
                        "display-lg": ["Syne"]
                    }
                }
            }
        }
    </script>

    <!-- Zingoo Specific Styles for Premium Look -->
    <style>
        body { font-family: 'Outfit', sans-serif; }
        h1, h2, h3, .font-display-lg { font-family: 'Syne', sans-serif; }
        
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Premium Glass Panel */
        .glass-panel {
            background: linear-gradient(145deg, rgba(25, 20, 22, 0.75) 0%, rgba(10, 10, 10, 0.9) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 0, 76, 0.3);
            box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.05), 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        /* Hot Pink Gradient Button */
        .btn-hot-pink-gradient {
            background: linear-gradient(135deg, #ff004c 0%, #ff3b6b 100%);
            box-shadow: 0 6px 30px rgba(255, 0, 76, 0.65), inset 0 2px 2px rgba(255,255,255,0.35);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .btn-hot-pink-gradient:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 40px rgba(255, 0, 76, 0.8), inset 0 2px 2px rgba(255,255,255,0.5);
        }
        
        .btn-hot-pink-gradient:active {
            transform: translateY(2px) scale(0.98);
        }

        /* 3D Animations & Glows */
        .text-glow-white { text-shadow: 0 0 12px rgba(255,255,255,0.6); }
        .text-glow-red { text-shadow: 0 0 15px rgba(255, 0, 76, 0.9), 0 0 35px rgba(255, 0, 76, 0.7); }
        
        .animate-fade-up {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes fadeInUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* Live Pulse Effect */
        .live-pulse {
            position: absolute; inset: -5px; border-radius: 50%; border: 2px solid #ff004c;
            box-shadow: 0 0 10px rgba(255, 0, 76, 0.5), inset 0 0 10px rgba(255, 0, 76, 0.5);
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(1.4); opacity: 0; }
        }
    </style>
</head>
<body class="bg-[#040404] text-[#e5e2e1] min-h-screen flex flex-col items-center justify-center relative overflow-hidden antialiased">

    <!-- Ambient Background Glows -->
    <div class="fixed inset-0 z-0 pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-[50vw] h-[50vw] rounded-full bg-[#8b0000]/20 blur-[130px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] rounded-full bg-[#ff004c]/15 blur-[160px]"></div>
    </div>

    <!-- Zingoo Header Logo (Standalone) -->
    <div class="absolute top-6 left-0 w-full flex justify-center z-10 animate-fade-up">
        <div class="flex items-center cursor-default">
            <span class="text-glow-white tracking-[0.1em] font-light text-[22px]" style="font-family: 'Times New Roman', serif;">ZIN</span>
            <span class="text-[#ff004c] font-black text-[30px] text-glow-red ml-1 transform scale-y-125 -rotate-6">GOO</span>
        </div>
    </div>

    <!-- Main Payment Card -->
    <main class="relative z-20 w-full max-w-md px-4 animate-fade-up" style="animation-delay: 0.1s;">
        
        <div id="payment-card" class="glass-panel p-8 rounded-[30px] w-full text-center flex flex-col items-center">
            
            <!-- Diamond Icon with Pulse -->
            <div class="relative w-20 h-20 mb-6 flex items-center justify-center">
                <div class="live-pulse"></div>
                <div class="w-full h-full bg-gradient-to-br from-[#1a1a1a] to-[#0a0a0a] rounded-full border-2 border-[#ff004c] flex items-center justify-center z-10 shadow-[0_0_20px_rgba(255,0,76,0.6)]">
                    <span class="material-symbols-outlined text-[#ffd700] text-[40px] drop-shadow-[0_0_10px_rgba(255,215,0,0.8)]">diamond</span>
                </div>
            </div>

            <!-- Headings -->
            <h2 class="text-white text-2xl font-black mb-1 text-glow-white">Secure Recharge</h2>
            <p class="text-[#ff8fa3] text-xs font-bold tracking-widest uppercase mb-6" id="display-username">User: Loading...</p>

            <!-- Amount & Diamonds Display Box -->
            <div class="w-full bg-[#000000]/60 border border-white/10 rounded-2xl p-5 mb-8 shadow-inner relative overflow-hidden group hover:border-[#ff004c]/50 transition-colors">
                <div class="absolute top-0 right-0 w-24 h-24 bg-[#ffd700]/10 rounded-bl-full pointer-events-none"></div>
                
                <p class="text-white/50 text-[10px] uppercase font-bold tracking-wider mb-1">Total Payable</p>
                <div class="text-4xl font-black text-white drop-shadow-lg mb-2" id="display-amount">₹0</div>
                
                <div class="inline-flex items-center gap-1.5 bg-[#ffd700]/10 border border-[#ffd700]/30 px-3 py-1 rounded-full">
                    <span class="material-symbols-outlined text-[#ffd700] text-[14px]">add_circle</span>
                    <span class="text-[#ffd700] text-sm font-bold" id="display-diamonds">0 Diamonds</span>
                </div>
            </div>

            <!-- Pay Button -->
            <button id="btn-pay-now" class="w-full h-14 rounded-full btn-hot-pink-gradient text-white font-extrabold tracking-[0.15em] uppercase text-[15px] flex items-center justify-center gap-2">
                <span id="btn-text">PAY NOW</span>
                <span class="material-symbols-outlined text-[22px]" id="btn-icon">lock</span>
            </button>
            
            <p class="text-[10px] text-white/40 mt-5 leading-relaxed font-medium flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[12px]">security</span>
                100% Secure Payment via Razorpay
            </p>
        </div>

        <!-- Processing Overlay (Hidden by default) -->
        <div id="processing-overlay" class="absolute inset-0 bg-[#040404]/90 backdrop-blur-md rounded-[30px] flex-col items-center justify-center hidden z-30 border border-[#ff004c]/30">
            <div class="w-16 h-16 border-4 border-[#ff004c]/20 border-t-[#ff004c] rounded-full animate-spin mb-4 shadow-[0_0_15px_rgba(255,0,76,0.5)]"></div>
            <h3 class="text-white font-bold text-lg text-glow-white tracking-widest animate-pulse">Processing...</h3>
            <p class="text-white/50 text-xs mt-2">Please do not close this page.</p>
        </div>

    </main>

    <!-- FIREBASE & PAYMENT LOGIC -->
    <script type="module">
        // Import Firebase v10 Modular SDKs
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, update, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // --- ZINGOO FIREBASE CONFIGURATION ---
        // Yahan sirf Zingoo ka Firebase hai, Iccha ka nahi. Data clash nahi hoga.
        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app",
            messagingSenderId: "113274194106",
            appId: "1:113274194106:web:c2548c12c1ea20c5b69a83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- URL PARAMETERS EXTRACT LOGIC ---
        const urlParams = new URLSearchParams(window.location.search);
        const isFromZingoo = urlParams.get('from') === 'zingoo';
        const username = urlParams.get('username');
        const amount = parseInt(urlParams.get('amount'));
        const diamonds = parseInt(urlParams.get('diamonds'));

        // Validation Check
        if (!isFromZingoo || !username || isNaN(amount) || isNaN(diamonds)) {
            alert("Invalid Payment Link! Redirecting...");
            window.location.href = "https://shubhzone.shop"; // Failsafe
        } else {
            // Update UI with Extracted Data
            document.getElementById('display-username').textContent = `User: ${username}`;
            document.getElementById('display-amount').textContent = `₹${amount}`;
            document.getElementById('display-diamonds').textContent = `${diamonds} Diamonds`;
        }

        // --- RAZORPAY PAYMENT LOGIC ---
        const payBtn = document.getElementById('btn-pay-now');
        const processingOverlay = document.getElementById('processing-overlay');
        const btnText = document.getElementById('btn-text');
        const btnIcon = document.getElementById('btn-icon');

        payBtn.addEventListener('click', async () => {
            // UI Change: Button loading state
            payBtn.disabled = true;
            btnText.textContent = "INITIALIZING...";
            btnIcon.textContent = "sync";
            btnIcon.classList.add("animate-spin");

            try {
                // Call Shubhzone (Iccha) Backend to create Razorpay Order
                const response = await fetch('https://iccha.onrender.com/create-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: amount })
                });

                if (!response.ok) throw new Error("Could not connect to the payment server.");
                const order = await response.json();

                // Razorpay Configuration
                const options = {
                    "key": "rzp_live_SLt76BnauOx2Cb", // Live Shubhzone Key
                    "amount": order.amount,
                    "currency": "INR",
                    "name": "Zingoo VIP",
                    "description": `Recharge ${diamonds} Diamonds`,
                    "order_id": order.id,
                    "handler": function (response) {
                        // PAYMENT SUCCESSFUL - Show Processing Overlay
                        processingOverlay.style.display = 'flex';
                        
                        // ADD DIAMONDS TO ZINGOO FIREBASE
                        const userRef = ref(db, `users/${username}`);
                        
                        // Using 'increment' properly updates the value without overwriting existing data
                        update(userRef, {
                            diamonds: increment(diamonds)
                        }).then(() => {
                            // Database Updated Successfully
                            alert(`Payment Successful! ${diamonds} Diamonds have been added. Returning to Zingoo...`);
                            
                            // Redirect user back to Zingoo (Going back in browser history works perfectly)
                            if (document.referrer) {
                                window.location.href = document.referrer;
                            } else {
                                window.history.back();
                            }
                        }).catch((error) => {
                            console.error("Firebase Update Error:", error);
                            alert("Payment was successful, but diamonds could not be updated. Please contact Zingoo Support.");
                            processingOverlay.style.display = 'none';
                            resetButton();
                        });
                    },
                    "prefill": {
                        "name": username
                    },
                    "theme": { "color": "#ff004c" }
                };

                const rzp1 = new Razorpay(options);
                
                rzp1.on('payment.failed', function (response) {
                    alert("Payment Failed. Reason: " + response.error.description);
                    resetButton();
                });

                rzp1.open();
                resetButton(); // Reset button UI since Razorpay popup is now open

            } catch (error) {
                console.error("Payment Initialization Error:", error);
                alert("Something went wrong while setting up the payment. Please check your internet connection.");
                resetButton();
            }
        });

        function resetButton() {
            payBtn.disabled = false;
            btnText.textContent = "PAY NOW";
            btnIcon.textContent = "lock";
            btnIcon.classList.remove("animate-spin");
        }
    </script>
</body>
</html>
